{% extends 'base.html' %}

{% block title %}Rider Profiles{% endblock %}

{% block content %}
<br>
<div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="mb-0">Rider Profiles</h2>
    <a class="btn btn-primary" href="/profiles/new">New Rider</a>
</div>

{% if profiles %}
<div class="list-group">
    {% for profile in profiles %}
    <div class="list-group-item d-flex justify-content-between align-items-center">
        <span>{{ profile.display_name }}</span>
        <small class="text-muted">#{{ profile.id }}</small>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="alert alert-info">No rider profiles yet.</div>
{% endif %}
{% endblock %}
